<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="A beautiful black and pink themed shopping list app">
    
    <!-- iOS Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ShopList">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Shopping List</title>
    
    <!-- Direct paths without query strings for now -->
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <!-- Main View: List of Shopping Lists -->
    <div id="mainView" class="view active">
        <header class="app-header">
            <h1 class="app-title">
                <span class="icon">🛍️</span>
                Shopping Lists
            </h1>
        </header>

        <div class="container">
            <button id="createListBtn" class="btn-primary">
                <span class="btn-icon">+</span>
                Create New List
            </button>

            <div id="listsContainer" class="lists-grid">
                <!-- List cards will be inserted here -->
            </div>

            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📝</div>
                <h2>No Lists Yet</h2>
                <p>Create your first shopping list to get started!</p>
            </div>
        </div>
    </div>

    <!-- Detail View: Individual List Items -->
    <div id="detailView" class="view">
        <header class="app-header detail-header">
            <button id="backBtn" class="btn-back">
                <span>←</span>
            </button>
            <h1 id="listTitle" class="app-title">List Name</h1>
            <button id="deleteListBtn" class="btn-icon-only">
                <span>🗑️</span>
            </button>
        </header>

        <div class="container">
            <div class="progress-bar-container">
                <div class="progress-info">
                    <span id="progressText">0 of 0 completed</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>

            <div class="add-item-form">
                <input 
                    type="text" 
                    id="itemInput" 
                    class="input-field" 
                    placeholder="Add new item..."
                    autocomplete="off"
                >
                <button id="addItemBtn" class="btn-add">
                    <span>+</span>
                </button>
            </div>

            <div id="itemsContainer" class="items-list">
                <!-- Items will be inserted here -->
            </div>

            <div id="emptyItems" class="empty-state small">
                <div class="empty-icon">🛒</div>
                <p>No items yet. Add your first item above!</p>
            </div>
        </div>
    </div>

    <!-- Modal for creating new list -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Create New List</h2>
            <input 
                type="text" 
                id="listNameInput" 
                class="input-field" 
                placeholder="Enter list name..."
                autocomplete="off"
            >
            <div class="modal-actions">
                <button id="cancelBtn" class="btn-secondary">Cancel</button>
                <button id="confirmBtn" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <!-- Install Prompt -->
    <div id="installPrompt" class="install-prompt">
        <div class="install-content">
            <div class="install-icon">📱</div>
            <div class="install-text">
                <h3>Install App</h3>
                <p>Install this app on your home screen for a better experience!</p>
            </div>
            <button id="installBtn" class="btn-install">Install</button>
            <button id="dismissBtn" class="btn-dismiss">×</button>
        </div>
    </div>

    <!-- Update notification -->
    <div id="updateNotification" class="update-notification">
        <div class="update-content">
            <span>🔄 New version available!</span>
            <button id="updateBtn" class="btn-update">Update</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Force clear cache and reload
        if ('caches' in window) {
            caches.keys().then(names => {
                names.forEach(name => {
                    if (name.includes('shopping-list') && !name.includes('v1.2')) {
                        caches.delete(name);
                        console.log('Deleted old cache:', name);
                    }
                });
            });
        }

        // Register Service Worker
        let registration;
        if ('serviceWorker' in navigator) {
            // Unregister old service workers first
            navigator.serviceWorker.getRegistrations().then(registrations => {
                registrations.forEach(reg => {
                    reg.unregister();
                    console.log('Unregistered old service worker');
                });
            }).then(() => {
                // Register new service worker
                return navigator.serviceWorker.register('sw.js', {
                    scope: '/Shopping-List/'
                });
            }).then(reg => {
                registration = reg;
                console.log('Service Worker registered:', reg.scope);
                
                // Force update
                reg.update();
                
                // Listen for updates
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            showUpdateNotification();
                        }
                    });
                });
            }).catch(err => {
                console.error('Service Worker registration failed:', err);
            });
        }

        // Show update notification
        function showUpdateNotification() {
            const notification = document.getElementById('updateNotification');
            if (notification) {
                notification.style.display = 'block';
            }
        }

        // Handle update button
        const updateBtn = document.getElementById('updateBtn');
        if (updateBtn) {
            updateBtn.addEventListener('click', () => {
                if (registration && registration.waiting) {
                    registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                }
                window.location.reload(true);
            });
        }

        // Install prompt handling
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');
        const dismissBtn = document.getElementById('dismissBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                installPrompt.style.display = 'block';
            }
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log(`User response: ${outcome}`);
                    deferredPrompt = null;
                }
                installPrompt.style.display = 'none';
            });
        }

        if (dismissBtn) {
            dismissBtn.addEventListener('click', () => {
                installPrompt.style.display = 'none';
                localStorage.setItem('installPromptDismissed', 'true');
            });
        }

        if (localStorage.getItem('installPromptDismissed')) {
            installPrompt.style.display = 'none';
        }

        if (window.matchMedia('(display-mode: standalone)').matches) {
            installPrompt.style.display = 'none';
        }

        // Prevent pull-to-refresh
        document.body.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) return;
            if (window.scrollY === 0) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
