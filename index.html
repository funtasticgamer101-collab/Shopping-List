<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="A beautiful black and pink themed shopping list app">
    
    <!-- iOS Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ShopList">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Shopping List</title>
    
    <link rel="manifest" href="/Shopping-List/manifest.json">
    <link rel="stylesheet" href="/Shopping-List/styles.css">
    <link rel="icon" type="image/png" href="/Shopping-List/icon-192.png">
    <link rel="apple-touch-icon" href="/Shopping-List/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/Shopping-List/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/Shopping-List/icon-512.png">
</head>
<body>
    <!-- Main View: List of Shopping Lists -->
    <div id="mainView" class="view active">
        <header class="app-header">
            <h1 class="app-title">
                <span class="icon">🛍️</span>
                Shopping Lists
            </h1>
        </header>

        <div class="container">
            <button id="createListBtn" class="btn-primary">
                <span class="btn-icon">+</span>
                Create New List
            </button>

            <div id="listsContainer" class="lists-grid">
                <!-- List cards will be inserted here -->
            </div>

            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📝</div>
                <h2>No Lists Yet</h2>
                <p>Create your first shopping list to get started!</p>
            </div>
        </div>
    </div>

    <!-- Detail View: Individual List Items -->
    <div id="detailView" class="view">
        <header class="app-header detail-header">
            <button id="backBtn" class="btn-back">
                <span>←</span>
            </button>
            <h1 id="listTitle" class="app-title">List Name</h1>
            <button id="deleteListBtn" class="btn-icon-only">
                <span>🗑️</span>
            </button>
        </header>

        <div class="container">
            <div class="progress-bar-container">
                <div class="progress-info">
                    <span id="progressText">0 of 0 completed</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>

            <div class="add-item-form">
                <input 
                    type="text" 
                    id="itemInput" 
                    class="input-field" 
                    placeholder="Add new item..."
                    autocomplete="off"
                >
                <button id="addItemBtn" class="btn-add">
                    <span>+</span>
                </button>
            </div>

            <div id="itemsContainer" class="items-list">
                <!-- Items will be inserted here -->
            </div>

            <div id="emptyItems" class="empty-state small">
                <div class="empty-icon">🛒</div>
                <p>No items yet. Add your first item above!</p>
            </div>
        </div>
    </div>

    <!-- Modal for creating new list -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Create New List</h2>
            <input 
                type="text" 
                id="listNameInput" 
                class="input-field" 
                placeholder="Enter list name..."
                autocomplete="off"
            >
            <div class="modal-actions">
                <button id="cancelBtn" class="btn-secondary">Cancel</button>
                <button id="confirmBtn" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <!-- Install Prompt (for browsers that support it) -->
    <div id="installPrompt" class="install-prompt">
        <div class="install-content">
            <div class="install-icon">📱</div>
            <div class="install-text">
                <h3>Install App</h3>
                <p>Install this app on your home screen for a better experience!</p>
            </div>
            <button id="installBtn" class="btn-install">Install</button>
            <button id="dismissBtn" class="btn-dismiss">×</button>
        </div>
    </div>

    <script src="/Shopping-List/app.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/Shopping-List/sw.js', {
                    scope: '/Shopping-List/'
                })
                .then(reg => {
                    console.log('Service Worker registered successfully');
                    console.log('Scope:', reg.scope);
                })
                .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // Install prompt handling
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');
        const dismissBtn = document.getElementById('dismissBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Show install prompt if not already installed
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                installPrompt.style.display = 'block';
            }
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response: ${outcome}`);
                deferredPrompt = null;
            }
            installPrompt.style.display = 'none';
        });

        dismissBtn.addEventListener('click', () => {
            installPrompt.style.display = 'none';
            localStorage.setItem('installPromptDismissed', 'true');
        });

        // Check if already dismissed
        if (localStorage.getItem('installPromptDismissed')) {
            installPrompt.style.display = 'none';
        }

        // Hide install prompt if already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installPrompt.style.display = 'none';
        }

        // Prevent pull-to-refresh on mobile
        document.body.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) return;
            if (window.scrollY === 0) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
