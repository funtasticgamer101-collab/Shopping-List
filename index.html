<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- App-like behavior -->
  <meta name="theme-color" content="#ff5a93" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.webmanifest" />

  <title>PinkList</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #fff;
    }

    .item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      transition: transform .2s ease, opacity .2s ease;
    }

    .item.removing {
      opacity: 0;
      transform: translateX(40px);
    }

    button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<button onclick="createList()">New List</button>
<div id="lists"></div>

<script>
/* ---------------------------
   HAPTICS
----------------------------*/
function haptic(type = "light"){
  if (!("vibrate" in navigator)) return;
  if(type === "light") navigator.vibrate(10);
  if(type === "medium") navigator.vibrate(20);
}

/* ---------------------------
   STORAGE
----------------------------*/
const STORAGE_KEY = "pinklist:pwa:v2";

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { lists: [] };

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ---------------------------
   UI RENDER
----------------------------*/
function render(){
  const root = document.getElementById("lists");
  root.innerHTML = "";

  state.lists.forEach(list => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${list.title}</h3>
      <input placeholder="Add item..." onkeydown="handleAdd(event,'${list.id}')">
      ${list.items.map(item => `
        <div class="item" data-id="${item.id}">
          ${item.text}
          <button onclick="deleteItem('${list.id}','${item.id}')">X</button>
        </div>
      `).join("")}
    `;

    root.appendChild(div);
  });
}

/* ---------------------------
   CRUD
----------------------------*/
function createList(){
  haptic();
  state.lists.push({
    id: crypto.randomUUID(),
    title: "New List",
    items: []
  });
  save();
  render();
}

function handleAdd(e, listId){
  if(e.key !== "Enter") return;

  haptic();

  const text = e.target.value.trim();
  if(!text) return;

  const list = state.lists.find(l => l.id === listId);
  list.items.push({
    id: crypto.randomUUID(),
    text
  });

  e.target.value = "";
  save();
  render();
}

function deleteItem(listId, itemId){
  haptic("medium");

  const el = document.querySelector(`[data-id="${itemId}"]`);
  if(el){
    el.classList.add("removing");
    setTimeout(() => actuallyDelete(), 180);
  } else {
    actuallyDelete();
  }

  function actuallyDelete(){
    const list = state.lists.find(l => l.id === listId);
    list.items = list.items.filter(i => i.id !== itemId);
    save();
    render();
  }
}

/* ---------------------------
   SWIPE DELETE
----------------------------*/
let touchStartX = 0;

document.addEventListener("touchstart", (e) => {
  const item = e.target.closest(".item");
  if(!item) return;
  touchStartX = e.touches[0].clientX;
});

document.addEventListener("touchend", (e) => {
  const item = e.target.closest(".item");
  if(!item) return;

  const diff = touchStartX - e.changedTouches[0].clientX;

  if(diff > 80){
    const id = item.dataset.id;

    state.lists.forEach(list => {
      if(list.items.find(i => i.id === id)){
        deleteItem(list.id, id);
      }
    });
  }
});

/* ---------------------------
   SERVICE WORKER
----------------------------*/
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}

/* ---------------------------
   INIT
----------------------------*/
render();
</script>

</body>
</html>
